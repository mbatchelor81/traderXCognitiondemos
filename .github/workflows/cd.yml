name: CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  TENANT_ID: acme_corp

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - users-service
          - trades-service
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: traderx-${{ matrix.service }}-${{ env.TENANT_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       services/${{ matrix.service }}/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS (force new deployment)
        run: |
          CLUSTER_NAME="traderx-demo"
          for SERVICE in users-service trades-service; do
            echo "Forcing new deployment for $SERVICE..."
            aws ecs update-service \
              --cluster $CLUSTER_NAME \
              --service traderx-${SERVICE} \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          done

      - name: Wait for services to stabilize
        run: |
          CLUSTER_NAME="traderx-demo"
          echo "Waiting 120 seconds for ECS tasks to stabilize..."
          sleep 120
          for SERVICE in users-service trades-service; do
            aws ecs describe-services \
              --cluster $CLUSTER_NAME \
              --services traderx-${SERVICE} \
              --query 'services[0].{status:status,running:runningCount,desired:desiredCount}' \
              --region ${{ env.AWS_REGION }}
          done

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke test dependencies
        run: pip install -r tests/smoke/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ALB URL
        id: alb
        run: |
          ALB_URL=$(aws elbv2 describe-load-balancers \
            --names traderx-demo-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text \
            --region ${{ env.AWS_REGION }})
          if [ -z "$ALB_URL" ] || [ "$ALB_URL" = "None" ]; then
            echo "ERROR: Could not resolve ALB URL"
            exit 1
          fi
          echo "url=$ALB_URL" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        env:
          SMOKE_TEST_URL: http://${{ steps.alb.outputs.url }}
        run: python -m pytest tests/smoke/ -v

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test
    # IMPORTANT: The 'production' environment must be configured in
    # GitHub repo Settings > Environments with required reviewers
    # to enforce manual approval before production deployment.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Production ECS
        run: |
          CLUSTER_NAME="traderx-prod"
          for SERVICE in users-service trades-service; do
            echo "Deploying $SERVICE to production..."
            aws ecs update-service \
              --cluster $CLUSTER_NAME \
              --service traderx-${SERVICE} \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          done

      - name: Wait for production services to stabilize
        run: |
          echo "Waiting 120 seconds for production ECS tasks to stabilize..."
          sleep 120
          echo "Production deployment complete."
