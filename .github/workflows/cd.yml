name: CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  TENANT_ID: acme_corp
  ENVIRONMENT: demo

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [users-service, trades-service, web-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: traderx-${{ matrix.service }}-${{ env.TENANT_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ "${{ matrix.service }}" = "web-frontend" ]; then
            BUILD_CONTEXT="web-front-end/react"
          else
            BUILD_CONTEXT="services/${{ matrix.service }}"
          fi
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $BUILD_CONTEXT/
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Force new ECS deployment
        run: |
          CLUSTER_NAME="traderx-${{ env.TENANT_ID }}-${{ env.ENVIRONMENT }}"
          for service in users-service trades-service web-frontend; do
            SERVICE_NAME="traderx-${service}-${{ env.TENANT_ID }}"
            aws ecs update-service \
              --cluster $CLUSTER_NAME \
              --service $SERVICE_NAME \
              --force-new-deployment \
              --no-cli-pager || true
          done
      - name: Wait for services to stabilize
        run: |
          CLUSTER_NAME="traderx-${{ env.TENANT_ID }}-${{ env.ENVIRONMENT }}"
          echo "Waiting 120 seconds for ECS tasks to stabilize..."
          sleep 120
          for service in users-service trades-service web-frontend; do
            SERVICE_NAME="traderx-${service}-${{ env.TENANT_ID }}"
            aws ecs describe-services \
              --cluster $CLUSTER_NAME \
              --services $SERVICE_NAME \
              --query 'services[0].{running: runningCount, desired: desiredCount}' \
              --no-cli-pager || true
          done

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          pip install -r tests/smoke/requirements.txt
      - name: Run smoke tests
        env:
          SMOKE_TEST_URL: ${{ secrets.STAGING_ALB_URL }}
        run: |
          python -m pytest tests/smoke/ -v

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test
    # IMPORTANT: The 'production' environment must be configured in GitHub
    # repo settings (Settings > Environments > New environment) with
    # required reviewers for manual approval gating.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Force new ECS deployment (production)
        run: |
          CLUSTER_NAME="traderx-${{ env.TENANT_ID }}-production"
          for service in users-service trades-service web-frontend; do
            SERVICE_NAME="traderx-${service}-${{ env.TENANT_ID }}"
            aws ecs update-service \
              --cluster $CLUSTER_NAME \
              --service $SERVICE_NAME \
              --force-new-deployment \
              --no-cli-pager || true
          done
      - name: Wait for services to stabilize
        run: |
          echo "Waiting 120 seconds for ECS tasks to stabilize..."
          sleep 120
      - name: Verify deployment
        run: |
          echo "Production deployment complete. Manual verification recommended."
