name: CD Pipeline

on:
  push:
    branches:
      - main
      - feature/single-tenant-migration

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: traderx-demo
  TENANT_ID: test_tenant
  NAMESPACE: traderx-test-tenant

jobs:
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - account-service
          - trading-service
          - position-service
          - reference-data-service
          - people-service
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: services/${{ matrix.service }}
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: traderx-${{ matrix.service }}-${{ env.TENANT_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Update image tags in Kustomize overlay
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd k8s/overlays/tenant-${{ env.TENANT_ID }}
          for service in account-service trading-service position-service reference-data-service people-service; do
            kustomize edit set image ${service}:latest=$ECR_REGISTRY/traderx-${service}-${{ env.TENANT_ID }}:${IMAGE_TAG}
          done

      - name: Deploy to EKS
        run: |
          kubectl apply -k k8s/overlays/tenant-${{ env.TENANT_ID }}/

      - name: Wait for rollouts to complete
        run: |
          for service in account-service trading-service position-service reference-data-service people-service; do
            echo "Waiting for $service rollout..."
            kubectl rollout status deployment/$service -n ${{ env.NAMESPACE }} --timeout=300s
          done

      - name: Verify all pods are Running
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          RUNNING=$(kubectl get pods -n ${{ env.NAMESPACE }} --no-headers | grep -c "Running" || true)
          TOTAL=$(kubectl get pods -n ${{ env.NAMESPACE }} --no-headers | wc -l)
          echo "Running pods: $RUNNING / $TOTAL"
          if [ "$RUNNING" -ne "$TOTAL" ]; then
            echo "Not all pods are running!"
            exit 1
          fi

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Get ALB URL
        id: alb-url
        run: |
          ALB_URL=$(kubectl get ingress -n ${{ env.NAMESPACE }} -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [ -z "$ALB_URL" ]; then
            echo "No ALB URL found, using port-forward for smoke tests"
            echo "use_port_forward=true" >> $GITHUB_OUTPUT
          else
            echo "alb_url=http://$ALB_URL" >> $GITHUB_OUTPUT
            echo "use_port_forward=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke test dependencies
        run: |
          pip install -r tests/smoke/requirements.txt

      - name: Run smoke tests
        env:
          SMOKE_TEST_URL: ${{ steps.alb-url.outputs.alb_url }}
        run: |
          if [ "${{ steps.alb-url.outputs.use_port_forward }}" = "true" ]; then
            echo "Skipping smoke tests - no ALB URL available"
          else
            python -m pytest tests/smoke/ -v
          fi
