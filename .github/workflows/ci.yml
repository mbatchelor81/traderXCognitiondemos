name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/single-tenant-migration
  pull_request:
    branches:
      - main

env:
  TENANT_ID: test_tenant

jobs:
  lint:
    name: Lint - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: account-service
            path: services/account-service
            type: python
          - service: trading-service
            path: services/trading-service
            type: python
          - service: position-service
            path: services/position-service
            type: python
          - service: reference-data-service
            path: services/reference-data-service
            type: python
          - service: people-service
            path: services/people-service
            type: python
          - service: web-frontend
            path: web-front-end/react
            type: node
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies and lint
        if: matrix.type == 'python'
        working-directory: ${{ matrix.path }}
        run: |
          pip install -r requirements.txt
          pip install ruff
          ruff check .

      - name: Set up Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Node dependencies and lint
        if: matrix.type == 'node'
        working-directory: ${{ matrix.path }}
        run: |
          npm ci
          npm run lint

  test:
    name: Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: account-service
            path: services/account-service
            type: python
          - service: trading-service
            path: services/trading-service
            type: python
          - service: position-service
            path: services/position-service
            type: python
          - service: reference-data-service
            path: services/reference-data-service
            type: python
          - service: people-service
            path: services/people-service
            type: python
          - service: web-frontend
            path: web-front-end/react
            type: node
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test Python service
        if: matrix.type == 'python'
        working-directory: ${{ matrix.path }}
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v --tb=short

      - name: Set up Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install and test Node service
        if: matrix.type == 'node'
        working-directory: ${{ matrix.path }}
        run: |
          npm ci
          npx react-scripts test --watchAll=false

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python,javascript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  docker-build:
    name: Docker Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]
    strategy:
      matrix:
        include:
          - service: account-service
            context: services/account-service
          - service: trading-service
            context: services/trading-service
          - service: position-service
            context: services/position-service
          - service: reference-data-service
            context: services/reference-data-service
          - service: people-service
            context: services/people-service
          - service: web-frontend
            context: web-front-end/react
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t traderx-${{ matrix.service }}:${{ github.sha }} ${{ matrix.context }}
