name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/single-tenant-migration
  pull_request:
    branches:
      - main

env:
  TENANT_ID: acme_corp

jobs:
  lint:
    name: Lint - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - users-service
          - trades-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and linter
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Run lint checks
        working-directory: services/${{ matrix.service }}
        run: ruff check .

  test:
    name: Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - users-service
          - trades-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        working-directory: services/${{ matrix.service }}
        run: |
          TENANT_ID=${{ env.TENANT_ID }} python -m pytest tests/ -v --cov=app --cov-report=term-missing

  security-scan:
    name: Security Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - users-service
          - trades-service
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build -t traderx-${{ matrix.service }}:scan services/${{ matrix.service }}/

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: traderx-${{ matrix.service }}:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  docker-build:
    name: Docker Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]
    strategy:
      matrix:
        service:
          - users-service
          - trades-service
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t traderx-${{ matrix.service }}:${{ github.sha }} \
            -t traderx-${{ matrix.service }}:latest \
            services/${{ matrix.service }}/
