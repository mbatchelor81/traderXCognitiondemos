name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/single-tenant-migration
  pull_request:
    branches:
      - main

env:
  TENANT_ID: acme_corp

jobs:
  lint:
    name: Lint - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [users-service, trades-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies and linter
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install ruff
      - name: Run lint checks
        run: |
          cd services/${{ matrix.service }}
          ruff check .

  test:
    name: Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [users-service, trades-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: |
          cd services/${{ matrix.service }}
          TENANT_ID=${{ env.TENANT_ID }} python -m pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
        if: always()

  security-scan:
    name: Security Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [users-service, trades-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image for scanning
        run: |
          docker build -t traderx-${{ matrix.service }}:scan services/${{ matrix.service }}/
      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: traderx-${{ matrix.service }}:scan
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  docker-build:
    name: Docker Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]
    strategy:
      matrix:
        service: [users-service, trades-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t traderx-${{ matrix.service }}:${{ github.sha }} services/${{ matrix.service }}/
      - name: Verify image
        run: |
          docker image inspect traderx-${{ matrix.service }}:${{ github.sha }}
