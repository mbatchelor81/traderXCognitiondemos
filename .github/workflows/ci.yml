name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/single-tenant-migration
  pull_request:
    branches:
      - main

env:
  TENANT_ID: acme_corp

jobs:
  lint:
    name: Lint - ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: users-service
            path: services/users-service
            type: python
          - name: trades-service
            path: services/trades-service
            type: python
          - name: frontend
            path: web-front-end/react
            type: node
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.service.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies and lint
        if: matrix.service.type == 'python'
        working-directory: ${{ matrix.service.path }}
        run: |
          pip install -r requirements.txt
          pip install ruff
          ruff check .

      - name: Set up Node.js
        if: matrix.service.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies and lint
        if: matrix.service.type == 'node'
        working-directory: ${{ matrix.service.path }}
        run: |
          npm ci
          npm run lint || echo "Lint completed with warnings"

  test:
    name: Test - ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: users-service
            path: services/users-service
            type: python
          - name: trades-service
            path: services/trades-service
            type: python
          - name: frontend
            path: web-front-end/react
            type: node
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.service.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies and run tests
        if: matrix.service.type == 'python'
        working-directory: ${{ matrix.service.path }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
          TENANT_ID=${{ env.TENANT_ID }} python -m pytest tests/ -v --tb=short

      - name: Set up Node.js
        if: matrix.service.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies and run tests
        if: matrix.service.type == 'node'
        working-directory: ${{ matrix.service.path }}
        run: |
          npm ci
          npx react-scripts test --watchAll=false --ci || echo "Tests completed"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build users-service image
        run: docker build -t traderx-users-service:scan services/users-service/

      - name: Build trades-service image
        run: docker build -t traderx-trades-service:scan services/trades-service/

      - name: Run Trivy on users-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: traderx-users-service:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy on trades-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: traderx-trades-service:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  docker-build:
    name: Docker Build - ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]
    strategy:
      matrix:
        service:
          - name: users-service
            context: services/users-service
          - name: trades-service
            context: services/trades-service
          - name: frontend
            context: web-front-end/react
            build_args: |
              REACT_APP_TENANT_ID=acme_corp
              REACT_APP_API_URL=
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag traderx-${{ matrix.service.name }}:${{ github.sha }} \
            ${{ matrix.service.build_args && format('--build-arg {0}', join(matrix.service.build_args, ' --build-arg ')) || '' }} \
            ${{ matrix.service.context }}
