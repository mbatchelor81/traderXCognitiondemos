server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React app - handle client-side routing
    # In ECS/production, the ALB handles path-based routing to backend services.
    # In Docker Compose, nginx-local.conf adds proxy_pass blocks for local routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
