apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traderx-ingress
  namespace: traderx
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # Users service routes
          - path: /account
            pathType: Prefix
            backend:
              service:
                name: users-service
                port:
                  number: 8001
          - path: /accountuser
            pathType: Prefix
            backend:
              service:
                name: users-service
                port:
                  number: 8001
          - path: /people
            pathType: Prefix
            backend:
              service:
                name: users-service
                port:
                  number: 8001
          # Trades service routes
          - path: /trade
            pathType: Prefix
            backend:
              service:
                name: trades-service
                port:
                  number: 8002
          - path: /trades
            pathType: Prefix
            backend:
              service:
                name: trades-service
                port:
                  number: 8002
          - path: /positions
            pathType: Prefix
            backend:
              service:
                name: trades-service
                port:
                  number: 8002
          - path: /stocks
            pathType: Prefix
            backend:
              service:
                name: trades-service
                port:
                  number: 8002
          # Frontend (catch-all, must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
