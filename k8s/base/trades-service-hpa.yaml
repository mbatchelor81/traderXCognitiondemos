apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trades-service-hpa
  namespace: traderx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trades-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
