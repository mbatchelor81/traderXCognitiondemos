apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: traderx
  labels:
    app: account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: account-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: TENANT_ID
              value: "PLACEHOLDER"
            - name: PEOPLE_SERVICE_URL
              value: "http://people-service:8005"
          envFrom:
            - configMapRef:
                name: account-service-config
            - secretRef:
                name: account-service-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
