apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: traderx-acme-corp

resources:
  - ../../base

patches:
  # Patch namespace
  - target:
      kind: Namespace
      name: traderx
    patch: |
      - op: replace
        path: /metadata/name
        value: traderx-acme-corp

  # Patch users-service TENANT_ID
  - target:
      kind: Deployment
      name: users-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: acme_corp

  # Patch trades-service TENANT_ID
  - target:
      kind: Deployment
      name: trades-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: acme_corp
