apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: traderx-acme-corp

images:
  - name: traderx-users-service
    newName: 599083837640.dkr.ecr.us-east-1.amazonaws.com/traderx-users-service-acme_corp
    newTag: latest
  - name: traderx-trades-service
    newName: 599083837640.dkr.ecr.us-east-1.amazonaws.com/traderx-trades-service-acme_corp
    newTag: latest
  - name: traderx-frontend
    newName: 599083837640.dkr.ecr.us-east-1.amazonaws.com/traderx-frontend-acme_corp
    newTag: latest

patches:
  # Patch namespace resource to use tenant-specific name
  - target:
      kind: Namespace
      name: traderx
    patch: |
      - op: replace
        path: /metadata/name
        value: traderx-acme-corp

  # Patch users-service deployment to set TENANT_ID
  - target:
      kind: Deployment
      name: users-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: acme_corp

  # Patch trades-service deployment to set TENANT_ID
  - target:
      kind: Deployment
      name: trades-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: acme_corp
