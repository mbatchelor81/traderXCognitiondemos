version: "3.8"

services:
  users-service:
    build:
      context: ./services/users-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - TENANT_ID=${TENANT_ID:-acme_corp}
      - DATABASE_URL=sqlite:////app/data/app_users.db
      - PORT=8001
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  trades-service:
    build:
      context: ./services/trades-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - TENANT_ID=${TENANT_ID:-acme_corp}
      - DATABASE_URL=sqlite:////app/data/app_trades.db
      - PORT=8002
      - LOG_LEVEL=INFO
      - USERS_SERVICE_URL=http://users-service:8001
    depends_on:
      users-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./web-front-end/react
      dockerfile: Dockerfile
      args:
        REACT_APP_TENANT_ID: ${TENANT_ID:-acme_corp}
        REACT_APP_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      users-service:
        condition: service_healthy
      trades-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
